name: create-release
on:
  push:
    tags:
      - v*
permissions:
  contents: read
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        id: git-cliff
        with:
          args: --current --strip all
        env:
          OUTPUT: /tmp/release-notes.md
      - run: sudo apt-get update && sudo apt-get install libpixman-1-dev libwayland-dev meson scdoc wayland-protocols
      - name: prepare a tarball
        run: |
          meson setup --buildtype release build
          meson dist -C build --allow-dirty
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          body_path: /tmp/release-notes.md
          fail_on_unmatched_files: true
          files: |
            build/meson-dist/still-*.tar.xz
            build/meson-dist/still-*.tar.xz.sha256sum
          token: ${{ steps.app-token.outputs.token }}
